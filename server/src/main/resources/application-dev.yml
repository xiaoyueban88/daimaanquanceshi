DAVINCI3_HOME: E:\workspace\iflytek\bigData\git_project\edu_baize_server
server:
  protocol: http
  address: 127.0.0.1
  port: 8080
  servlet:
    context-path: /api-baize
  compression:
       enabled: true
       mime-types: application/json,application/xml,application/xhtml+xml,text/html,text/xml,text/plain
       min-response-size: 1024


file:
  userfiles-path: E:\workspace\iflytek\bigData\git_project\edu_baize_server\userfiles
  web_resources: ${DAVINCI3_HOME}/davinci-ui/
  phantomJs-path: ${DAVINCI3_HOME}/bin/phantom.js
  base-path: ${DAVINCI3_HOME}/lib/


spring:
  servlet:
    multipart:
      max-request-size: 1024MB
      max-file-size: 1024MB
      enabled: true

  config:
    location: classpath:/
    additional-location: file:${DAVINCI3_HOME}/config/
    name: application

  datasource:
    url: jdbc:mysql://172.31.7.9:3306/davinci?useUnicode=true&characterEncoding=UTF-8&zeroDateTimeBehavior=convertToNull&allowMultiQueries=true
    username: bigdataRW
    password: TY2020#mm
    driver-class-name: com.mysql.jdbc.Driver
    initial-size: 2
    min-idle: 1
    max-wait: 60000
    max-active: 10
    type: com.alibaba.druid.pool.DruidDataSource
    time-between-eviction-runs-millis: 30000
    min-evictable-idle-time-millis: 300000
    test-while-idle: true
    test-on-borrow: false
    test-on-return: false
    filters: stat
    break-after-acquire-failure: true
    connection-error-retry-attempts: 3
    validation-query: SELECT 1

  resources:
    static-locations: classpath:/META-INF/resources/, classpath:/resources/, classpath:/static/, file:${file.userfiles-path}, file:${file.web_resources}

  mvc:
    static-path-pattern: /**


  thymeleaf:
    mode: HTML5
    cache: true
    prefix: classpath:/templates/
    encoding: UTF-8
    suffix: .html
    check-template-location: true
    template-resolver-order: 1

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

  cache:
    caffeine:
      type: caffeine

  mail:
    host: mail.iflytek.com
    port:
    username: ebg_zx_ds@iflytek.com
    fromAddress: ebg_zx_ds@iflytek.com
    password: 7vMTHSX3E2uyfThd
    nickname: bigdata

    properties:
      mail:
        transport:
          protocol: smtp
        smtp:
          socketFactory:
            class: javax.net.ssl.SSLSocketFactory
            fallback: false
            port: 465
          port: 465
          auth: true
          ssl:
            enable: true

  ldap:
    urls:
    username:
    password:
    base:
    domainName:    # domainName 指 企业邮箱后缀，如企业邮箱为：xxx@example.com, 这里值为 '@example.com'


logging:
  config: file:${DAVINCI3_HOME}/config/logback.xml

springfox:
  documentation:
    swagger:
      v2:
        path: /api-doc


pagehelper:
  supportMethodsArguments: true
  reasonable: true
  returnPageInfo: check
  helperDialect: mysql
  params: count=countSql

mybatis:
  mapper-locations: classpath:mybatis/mapper/*Mapper.xml
  config-locations: classpath:mybatis/mybatis-config.xml
  type-aliases-package: edp.davinci.model
  configuration:
    map-underscore-to-camel-case: true
    use-generated-keys: true

mapper:
  identity: MYSQL
  not-empty: false
  mappers: edp.davinci.dao

sql_template_delimiter: $

custom-datasource-driver-path: ${DAVINCI3_HOME}/config/datasource_driver.yml

demo:
